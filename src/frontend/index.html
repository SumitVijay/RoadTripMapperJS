<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Road Trip Mapper (Open Source Engine)</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="./styles.css" />
</head>

<body>
    <div id="container">
        <div id="map"></div>
        <div id="ui-layer"></div>
    </div>

    <script type="module">
        // 📦 EXPLICIT ENGINE IMPORTS
        import { initializeRoute, updateVehicleFrame } from './map_engine.js';
        import { displayPhotoCard } from './ui_manager.js';

        // 🗺️ MAP ROOT ENGINE MOUNTING
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false,
            fadeAnimation: true,
            zoomAnimation: true
        }).setView([46.0, 7.0], 8);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 20
        }).addTo(map);

        console.log("🚀 Open-source map engine mounted completely free of credentials.");

        // 🧮 MATHEMATICAL CORE UTILITIES
        function calculateBearing(lat1, lon1, lat2, lon2) {
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const lat1Rad = lat1 * Math.PI / 180;
            const lat2Rad = lat2 * Math.PI / 180;
            const y = Math.sin(dLon) * Math.cos(lat2Rad);
            const x = Math.cos(lat1Rad) * Math.sin(lat2Rad) - Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLon);
            const brng = Math.atan2(y, x) * 180 / Math.PI;
            return (brng + 360) % 360;
        }

        // 🎞️ TIMELINE SEQUENCER ENGINE ARCHITECTURE
        async function runTimelineEngine() {
            try {
                console.log("[DIAGNOSTIC] 🔍 Starting up the pipeline engine sequence...");

                const uiContainer = document.getElementById('ui-layer');
                if (!uiContainer) {
                    console.error("❌ DIAGNOSTIC CRITICAL FAIL: Element #ui-layer was not found in the DOM structure!");
                    return;
                }
                console.log("✅ DIAGNOSTIC: #ui-layer DOM mount container verified.");

                // Persistent Global Engine Scopes
                let currentCoordIdx = 0;
                let activeBundleIdx = 0;
                let frameClock = null;
                let cardMountedForCurrentLeg = false;
                let totalRenderedFrames = 0;

                // 📡 API PIPELINE INITIALIZATION
                console.log("[DIAGNOSTIC] 📡 Attempting to fetch route geometry dataset...");
                const routeRes = await fetch('/data/route_geometry.json');
                const masterPath = await routeRes.json();
                console.log(`✅ DIAGNOSTIC: Successfully loaded ${masterPath.length} coordinate points.`);

                console.log("[DIAGNOSTIC] 📡 Attempting to fetch bundled trip dataset...");
                const tripRes = await fetch('/data/bundled_trip.json');
                const bundledTimeline = await tripRes.json();
                console.log(`✅ DIAGNOSTIC: Successfully loaded ${bundledTimeline.length} travel segments.`);

                if (masterPath.length === 0 || bundledTimeline.length === 0) {
                    console.error("❌ DIAGNOSTIC CRITICAL FAIL: Datasets are empty. Cannot calculate routing paths.");
                    return;
                }

                initializeRoute(map, masterPath);
                console.log("✅ DIAGNOSTIC: Leaflet map layout vector paths initialized.");

                const totalStops = bundledTimeline.length;
                const nodesPerSegment = Math.floor(masterPath.length / totalStops);
                console.log(`[DIAGNOSTIC] 🧮 Mathematical Bounds Calculated. Nodes per segment window: ${nodesPerSegment}`);

                console.log("🚀 STARTING ENGINE MAIN TICK INTERVAL ENGINE LOOP NOW...");

                const tick = async () => {
                    if (activeBundleIdx >= bundledTimeline.length) {
                        clearInterval(frameClock);
                        console.log("%c[FINAL] 🏁 Video compilation complete.", "color: #00ff66; font-weight: bold;");
                        //document.querySelectorAll('.photo-card').forEach(card => card.remove());
                        if (window.captureFrameSignal) await window.captureFrameSignal('COMPLETE');
                        return;
                    }

                    totalRenderedFrames++;

                    const currentStopGroup = bundledTimeline[activeBundleIdx];
                    const segmentStartIdx = activeBundleIdx * nodesPerSegment;
                    const targetStopIdx = (activeBundleIdx === totalStops - 1) ? masterPath.length - 1 : (activeBundleIdx + 1) * nodesPerSegment;

                    const segmentTotalNodes = targetStopIdx - segmentStartIdx;
                    const segmentProgressNodes = currentCoordIdx - segmentStartIdx;
                    const progressPercent = (segmentProgressNodes / Math.max(1, segmentTotalNodes)) * 100;

                    // 🌄 MIDPOINT TRIGGER GATE (Defensively Locked)
                    if (progressPercent >= 50 && !cardMountedForCurrentLeg) {
                        cardMountedForCurrentLeg = true;

                        const layoutStyleIdx = activeBundleIdx % 4;
                        const nodesRemaining = targetStopIdx - currentCoordIdx;

                        // ➕ ADD A BONUS WINDOW (e.g., +150 frames)
                        // This forces the card to survive long enough to meet the next leg's card!
                        const estimatedFramesLeft = Math.ceil(nodesRemaining / 8) + 150;

                        try {
                            console.log(
                                `%c[LIFECYCLE - MOUNT] Frame: ${totalRenderedFrames} | ` +
                                `Leg: ${activeBundleIdx + 1} | ` +
                                `Location: ${currentStopGroup[0].location_name} | ` +
                                `Calculated Card Lifespan: ${estimatedFramesLeft} frames`,
                                "color: #ff9500; font-weight: bold; background: #221600; padding: 2px 5px; border-radius: 3px;"
                            );

                            // 🔑 FIX: Pass estimatedFramesLeft right here!
                            displayPhotoCard(uiContainer, currentStopGroup, layoutStyleIdx, totalRenderedFrames, estimatedFramesLeft);

                        } catch (uiError) {
                            console.error("⚠️ UI Manager instantiation caught inside safe wrapper:", uiError.message);
                        }
                    }

                    // 🛡️ FRAME-BASED LIFECYCLE MONITOR
                    const activeCards = document.querySelectorAll('.photo-card');
                    activeCards.forEach(card => {
                        const fadeFrameTarget = parseInt(card.dataset.fadeFrame);
                        const removeFrameTarget = parseInt(card.dataset.removeFrame);

                        // Skip tracking entirely if dataset stamps failed to generate cleanly
                        if (isNaN(fadeFrameTarget) || isNaN(removeFrameTarget)) return;

                        // 📊 CRITICAL FADE MATCH LOG
                        // If the engine clock hits the precise fade marker frame, trigger the CSS transition
                        if (totalRenderedFrames === fadeFrameTarget) {
                            card.classList.add('fading-out');
                            card.classList.remove('active');
                            console.log(`%c[FRAME ENGINE - ACTION] Match hit at frame ${totalRenderedFrames}. Initiating fade on active card node.`, "color: #5ac8fa; font-weight: bold;");
                        }
                        // 📊 CRITICAL PURGE MATCH LOG
                        if (totalRenderedFrames >= removeFrameTarget) {
                            card.remove();
                            console.log(
                                `%c[LIFECYCLE - PURGE] Frame: ${totalRenderedFrames} | ` +
                                `Target Dead Frame: ${removeFrameTarget} | ` +
                                `Node successfully deleted from DOM.`,
                                "color: #ff3b30; font-weight: bold; background: #2f0505; padding: 2px 5px; border-radius: 3px;"
                            );
                        }

                        // 🗑️ Separate Garbage Collector for elements already fading out
                        // This handles the physical DOM removal completely independently
                        document.querySelectorAll('.photo-card.fading-out').forEach(card => {
                            const removeFrameTarget = parseInt(card.dataset.removeFrame);
                            if (!isNaN(removeFrameTarget) && totalRenderedFrames >= removeFrameTarget) {
                                card.remove();
                                console.log(`%c[FRAME ENGINE - GARBAGE] Frame ${totalRenderedFrames} >= ${removeFrameTarget}. Asset purged from memory.`, "color: #ff3b30; font-weight: bold;");
                            }
                        });
                    });

                    // 🏎️ UNINTERRUPTED DRIVING TICK PROFILE
                    if (currentCoordIdx < targetStopIdx) {
                        const [lat, lon] = masterPath[currentCoordIdx];
                        const nextCoordIdx = Math.min(currentCoordIdx + 1, masterPath.length - 1);
                        const [nextLat, nextLon] = masterPath[nextCoordIdx];

                        updateVehicleFrame(map, lat, lon);

                        const carElement = document.getElementById('car-pointer');
                        if (carElement && (lat !== nextLat || lon !== nextLon)) {
                            const headingDegrees = calculateBearing(lat, lon, nextLat, nextLon);
                            carElement.style.transform = `rotate(${headingDegrees}deg)`;
                        }

                        // 🏎️ CONFIGURABLE VELOCITY PROFILE (Scales perfectly with SPEED_MULTIPLIER)
                        const nodesRemaining = targetStopIdx - currentCoordIdx;
                        let baseStride;

                        if (nodesRemaining > 2000) {
                            baseStride = 65;  // Baseline highway sprint
                        } else if (nodesRemaining > 500) {
                            baseStride = 25;  // Baseline approaching leg
                        } else if (nodesRemaining > 50) {
                            baseStride = 8;   // Baseline deceleration crawl
                        } else {
                            baseStride = 2;   // Baseline final parking step
                        }

                        // 🎛️ GLOBAL VIDEO CINEMATIC CONTROLS
                        // 1.0 = Default baseline speed (~0.5 sec per leg video)
                        // 0.5 = Half speed (Doubles the video length to ~28 seconds)
                        // 0.2 = One-fifth speed (5x longer video, ~1 minute 10 seconds)
                        const SPEED_MULTIPLIER = 0.4;
                        // 🧮 Scale the final velocity dynamically, ensuring it never drops below 1 node per tick
                        const strideVelocity = Math.max(1, Math.round(baseStride * SPEED_MULTIPLIER));

                        currentCoordIdx = Math.min(currentCoordIdx + strideVelocity, targetStopIdx);


                        if (window.captureFrameSignal) await window.captureFrameSignal('RECORD_TICK');
                     } else {
                        // 📍 LEG TRANSITION BOUNDARY CROSSING
                        console.log(
                            `%c[LIFECYCLE - TRANSITION] Frame: ${totalRenderedFrames} | ` +
                            `🏁 Leg ${activeBundleIdx + 1} finished at node index ${currentCoordIdx}. ` +
                            `Advancing loop bounds naturally...`,
                            "color: #34c759; font-weight: bold; background: #0b2f12; padding: 2px 5px; border-radius: 3px;"
                        );

                        // ✅ FIXED: The Overlap Shield code has been removed.
                        // Cards are now completely free to sit still on screen across multiple legs!

                        activeBundleIdx++;
                        cardMountedForCurrentLeg = false;
                    }
                };

                // Engages frame step intervals at a targeted 40ms pacing rule
                frameClock = setInterval(tick, 40);

            } catch (err) {
                console.error("💥 Cinematic Engine Crash:", err.stack || err.message || err);
            }
        }

        // Engage the runtime architecture pipeline
        runTimelineEngine();
    </script>
</body>

</html>
